<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Fondo del círculo -->
  <circle cx="200" cy="200" r="180" fill="#FF6B6B" stroke="#D63031" stroke-width="4"/>
  
  <!-- Círculo interior -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Reloj de arena / Símbolo de tiempo -->
  <g transform="translate(200, 140)">
    <!-- Reloj de arena -->
    <path d="M -40 -40 L 40 -40 L 20 0 L 40 40 L -40 40 L -20 0 Z" 
          fill="#FFFFFF" stroke="#D63031" stroke-width="3"/>
    <!-- Arena superior -->
    <path d="M -30 -35 L -30 -25 L 0 0 L 30 -25 L 30 -35 Z" fill="#FFD93D"/>
    <!-- Arena inferior -->
    <path d="M -20 35 L -20 25 L 0 10 L 20 25 L 20 35 Z" fill="#FFD93D"/>
  </g>
  
  <!-- Texto TIEMPO AGOTADO -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" stroke="#D63031" stroke-width="1">
    TIEMPO
  </text>
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" stroke="#D63031" stroke-width="1">
    AGOTADO
  </text>
  
  <!-- Efecto de destello -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
</svg>
